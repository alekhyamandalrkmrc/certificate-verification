    function checkCredentials() {
      const inputName = document.getElementById('userName').value.trim().toLowerCase();
      const inputSerial = document.getElementById('serialNum').value.trim().toLowerCase();
      const resultDiv = document.getElementById('resultMessage');
      
      resultDiv.style.display = "none";
      
      if (!inputName || !inputSerial) {
        showResult("⚠️ Please fill out both fields.", "#fff3cd", "#856404");
        return;
      }
      
      // Look through the database records based on your exact JSON properties
      const matchFound = database.find(record => {
        // Automatically checks columns and cleans trailing spaces
        const recordName = String(record["Name"] || "").trim().toLowerCase();
        const recordSerial = String(record["Certificate_No"] || "").trim().toLowerCase();
        
        return recordName === inputName && recordSerial === inputSerial;
      });
      
      if (matchFound) {
        showResult("✓ Valid Certificate! Grade obtained: " + matchFound.Grade + ". This record is verified.", "#d4edda", "#155724");
      } else {
        showResult("✗ Verification Failed. The details entered do not match our database.", "#f8d7da", "#721c24");
      }
    }

    function showResult(text, bgColor, textColor) {
      const resultDiv = document.getElementById('resultMessage');
      resultDiv.innerText = text;
      resultDiv.style.backgroundColor = bgColor;
      resultDiv.style.color = textColor;
      resultDiv.style.display = "block";
    }
  </script>
