<!DOCTYPE html>
<html>
<head>

<title>Certificate Verification</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
padding:50px;
}

.card{

border:1px solid #ccc;
border-radius:10px;
padding:30px;
display:inline-block;
min-width:350px;

}

.valid{
color:green;
font-weight:bold;
}

.invalid{
color:red;
font-weight:bold;
}

</style>

</head>


<body>


<h1>Certificate Verification</h1>


<div class="card" id="result">

Checking certificate...

</div>



<script>


const params =
new URLSearchParams(window.location.search);


const cert =
params.get("id");



fetch("certificates.json")

.then(response => response.json())

.then(data => {


if(data[cert]){


document.getElementById("result").innerHTML = `

<h2>${data[cert].name}</h2>

<p>
Certificate Number:
<br>
<b>${cert}</b>
</p>


<p>
Grade:
${data[cert].grade}
</p>


<p class="valid">
✓ Certificate Verified
</p>

`;


}

else{


document.getElementById("result").innerHTML = `

<p class="invalid">
Certificate Not Found
</p>

`;

}


});


</script>
<!DOCTYPE html>
<html>
<body>

<h1>Certificate Verification</h1>

<div id="result"></div>

<script>

const id = new URLSearchParams(location.search).get("id");

fetch("certificates.json")
.then(r=>r.json())
.then(data=>{

if(data[id]){

document.getElementById("result").innerHTML =
`
<h2>${data[id].name}</h2>
<p>Certificate Number: ${id}</p>
<p>Grade: ${data[id].grade}</p>
<p>Status: ${data[id].status}</p>
`;

}

else{

document.getElementById("result").innerHTML =
"Certificate not found";

}

});

</script>

</body>
</html>

</body>
</html>
